<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mam do Ciebie pytanie… 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #fdf6f0;
      --rose:   #e8637a;
      --rose2:  #f4a0b0;
      --brown:  #5c3d2e;
      --cream:  #fff8f4;
      --border: rgba(92,61,46,.12);
      --shadow: rgba(232,99,122,.18);
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* petals bg */
    body::before {
      content: "";
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 15% 20%, rgba(244,160,176,.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 85% 80%, rgba(232,99,122,.13) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 60% 10%, rgba(255,220,210,.25) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ─── SCREENS ─── */
    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .6s ease;
    }
    .screen.active {
      opacity: 1;
      pointer-events: all;
    }

    /* ─── CARD ─── */
    .card {
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 56px 52px;
      max-width: 480px;
      width: 90%;
      text-align: center;
      box-shadow: 0 24px 80px rgba(92,61,46,.08), 0 4px 16px rgba(232,99,122,.06);
      position: relative;
    }

    .petal-deco {
      font-size: 2.4rem;
      letter-spacing: .15em;
      margin-bottom: 28px;
      display: block;
      line-height: 1;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      font-size: 2.2rem;
      color: var(--brown);
      line-height: 1.25;
      margin-bottom: 14px;
    }
    h1 em {
      font-style: italic;
      color: var(--rose);
    }

    .sub {
      font-size: .9rem;
      color: #a08070;
      line-height: 1.8;
      margin-bottom: 40px;
    }

    /* ─── BUTTONS ─── */
    .btn-row {
      display: flex;
      gap: 14px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      font-family: 'Lato', sans-serif;
      font-weight: 400;
      font-size: .9rem;
      letter-spacing: .06em;
      border: none;
      border-radius: 100px;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s;
      text-decoration: none;
      display: inline-block;
    }
    .btn-yes {
      background: var(--rose);
      color: #fff;
      padding: 15px 38px;
      box-shadow: 0 8px 28px var(--shadow);
    }
    .btn-yes:hover {
      transform: translateY(-2px) scale(1.04);
      box-shadow: 0 14px 36px var(--shadow);
    }
    .btn-no {
      background: transparent;
      color: #c0a898;
      border: 1px solid var(--border);
      padding: 14px 28px;
      position: fixed; /* pozwoli uciec poza karta */
    }

    /* ─── FORM ─── */
    .form-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.7rem;
      color: var(--brown);
      margin-bottom: 8px;
    }
    .form-sub {
      font-size: .85rem;
      color: #a08070;
      margin-bottom: 32px;
      line-height: 1.7;
    }

    .field { margin-bottom: 20px; text-align: left; }
    .field label {
      display: block;
      font-size: .72rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #a08070;
      margin-bottom: 7px;
    }
    .field input, .field textarea, .field select {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--brown);
      font-family: 'Lato', sans-serif;
      font-size: .88rem;
      font-weight: 300;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      appearance: none;
    }
    .field input:focus, .field textarea:focus, .field select:focus {
      border-color: var(--rose2);
      box-shadow: 0 0 0 3px rgba(232,99,122,.1);
    }
    .field textarea { resize: none; height: 88px; }

    .btn-send {
      width: 100%;
      padding: 15px;
      background: var(--rose);
      color: #fff;
      font-size: .9rem;
      letter-spacing: .08em;
      border-radius: 12px;
      margin-top: 8px;
      box-shadow: 0 8px 28px var(--shadow);
    }
    .btn-send:hover { transform: translateY(-2px); box-shadow: 0 14px 36px var(--shadow); }
    .btn-send:disabled { opacity: .6; cursor: default; transform: none; }

    /* formspree hidden */
    .f-hidden { display: none; }

    /* ─── SUCCESS ─── */
    .success-emoji { font-size: 3.6rem; margin-bottom: 20px; display: block; }
    .success-title {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--brown);
      margin-bottom: 12px;
    }
    .success-sub { font-size: .88rem; color: #a08070; line-height: 1.8; }

    /* ─── FLOATING HEARTS ─── */
    .heart {
      position: fixed;
      font-size: 1.4rem;
      pointer-events: none;
      animation: floatUp 3s ease-out forwards;
      z-index: 999;
    }
    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-160px) scale(.6); }
    }

    /* ─── CONFETTI ─── */
    .confetti-piece {
      position: fixed;
      width: 8px; height: 8px;
      border-radius: 2px;
      pointer-events: none;
      animation: confettiFall linear forwards;
      z-index: 998;
    }
    @keyframes confettiFall {
      0%   { opacity: 1; transform: translateY(-20px) rotate(0deg); }
      100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
    }
  </style>
</head>
<body>

<!-- SCREEN 1: pytanie -->
<div class="screen active" id="s1">
  <div class="card">
    <span class="petal-deco">🌸</span>
    <h1>Czy pójdziesz<br>ze mną na <em>randkę?</em></h1>
    <p class="sub">Mam dla nas pewien plan…<br>ale najpierw potrzebuję Twojej odpowiedzi.</p>
    <div class="btn-row" id="btnRow">
      <button class="btn btn-yes" id="btnYes" onclick="goToForm()">Tak, chętnie! 🌷</button>
      <button class="btn btn-no"  id="btnNo"  onmouseenter="runAway()" ontouchstart="runAway()">Nie</button>
    </div>
  </div>
</div>

<!-- SCREEN 2: formularz -->
<div class="screen" id="s2">
  <div class="card">
    <span class="petal-deco">🗓️</span>
    <div class="form-title">Kiedy do Ciebie<br><em style="font-style:italic;color:var(--rose)">pasuje?</em></div>
    <p class="form-sub">Wypełnij i wyślij — dostanę powiadomienie 🌹</p>

    <!-- Formspree endpoint — podmień YOUR_FORM_ID -->
    <form id="dateForm" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
      <input type="hidden" name="_subject" value="🌸 Odpowiedź na randkę!">

      <div class="field">
        <label>Data spotkania</label>
        <input type="date" name="data" id="dateInput" required>
      </div>
      <div class="field">
        <label>Godzina</label>
        <input type="time" name="godzina" id="timeInput" required>
      </div>
      <div class="field">
        <label>Uwagi / życzenia (opcjonalne)</label>
        <textarea name="uwagi" placeholder="Np. chcę lody, nie jem mięsa, mam alergię na koty…"></textarea>
      </div>

      <button type="submit" class="btn btn-send" id="sendBtn">Wyślij odpowiedź 💌</button>
    </form>
  </div>
</div>

<!-- SCREEN 3: sukces -->
<div class="screen" id="s3">
  <div class="card">
    <span class="success-emoji">🎉</span>
    <div class="success-title">Nie mogę się<br>doczekać!</div>
    <p class="success-sub">Dostałem Twoją odpowiedź 💌<br>Odezwę się wkrótce z detalami.<br><br>Do zobaczenia! 🌸</p>
  </div>
</div>

<script>
// ─── SCREEN SWITCH ───
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ─── UCIEKAJĄCY PRZYCISK NIE ───
let noBtn = document.getElementById('btnNo');
let noMoves = 0;

function runAway() {
  noMoves++;
  if (noMoves > 8) {
    // po kilku próbach znika
    noBtn.style.opacity = '0';
    noBtn.style.pointerEvents = 'none';
    return;
  }
  const margin = 60;
  const maxX = window.innerWidth  - noBtn.offsetWidth  - margin;
  const maxY = window.innerHeight - noBtn.offsetHeight - margin;
  const x = margin + Math.random() * maxX;
  const y = margin + Math.random() * maxY;
  noBtn.style.left = x + 'px';
  noBtn.style.top  = y + 'px';
  noBtn.style.transition = 'left .25s ease, top .25s ease';
}

// ustawienie startowe guzika
window.addEventListener('load', () => {
  const rect = document.getElementById('btnYes').getBoundingClientRect();
  noBtn.style.left = (rect.right + 14) + 'px';
  noBtn.style.top  = rect.top + 'px';
});

// ─── SERDUSZKA przy "Tak" ───
function spawnHearts() {
  const emojis = ['💕','🌸','💖','🌷','✨','💝'];
  for (let i = 0; i < 12; i++) {
    setTimeout(() => {
      const h = document.createElement('div');
      h.className = 'heart';
      h.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      h.style.left = (10 + Math.random()*80) + 'vw';
      h.style.bottom = '10vh';
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 3100);
    }, i * 120);
  }
}

function goToForm() {
  spawnHearts();
  setTimeout(() => show('s2'), 400);
  // ustaw min date na dziś
  document.getElementById('dateInput').min = new Date().toISOString().split('T')[0];
}

// ─── FORMULARZ SUBMIT ───
const form   = document.getElementById('dateForm');
const sendBtn = document.getElementById('sendBtn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  sendBtn.disabled = true;
  sendBtn.textContent = 'Wysyłam…';

  try {
    const res = await fetch(form.action, {
      method: 'POST',
      body: new FormData(form),
      headers: { 'Accept': 'application/json' }
    });
    if (res.ok) {
      spawnConfetti();
      setTimeout(() => show('s3'), 300);
    } else {
      throw new Error();
    }
  } catch {
    sendBtn.disabled = false;
    sendBtn.textContent = 'Wyślij odpowiedź 💌';
    alert('Coś poszło nie tak — sprawdź czy Form ID jest poprawne.');
  }
});

// ─── CONFETTI ───
function spawnConfetti() {
  const colors = ['#e8637a','#f4a0b0','#ffd6e0','#5c3d2e','#ffb3c6','#fff'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.left = Math.random()*100 + 'vw';
      c.style.top  = '-10px';
      c.style.background = colors[Math.floor(Math.random()*colors.length)];
      c.style.animationDuration = (2 + Math.random()*2) + 's';
      c.style.animationDelay = (Math.random()*.5) + 's';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 4500);
    }, i * 40);
  }
}
</script>
</body>
</html>
